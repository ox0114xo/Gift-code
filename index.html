<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贏麻小助手</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ox0114xo/Gift-code/refs/heads/main/IMG_20260220_102243.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ox0114xo/Gift-code/refs/heads/main/IMG_20260220_102243.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="贏麻小助手">
    <meta name="theme-color" content="#f2f4f7">
    <link rel="manifest" id="pwa-manifest">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* 極簡化 CSS */
        body,html { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f2f4f7; color:#333; user-select:none; }
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        .wrap { max-width:600px; margin:0 auto; padding:15px; min-height:100vh; }
        h2 { text-align:center; color:#2c3e50; margin:5px 0 20px; font-size:1.8rem; font-weight:900; }
        
        .dash { display:flex; background:#fff; padding:15px; border-radius:16px; margin-bottom:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,.05); }
        .dash div { flex:1; }
        .dash span { font-size:.85rem; color:#95a5a6; font-weight:700; }
        .dash strong { display:block; font-size:1.5rem; color:#2c3e50; font-weight:900; }
        
        .ctrl { display:flex; gap:8px; margin-bottom:15px; position:sticky; top:10px; z-index:10; background:rgba(242,244,247,.95); padding:5px 0; backdrop-filter:blur(5px); }
        .ctrl button { flex:1; padding:12px 0; border:none; border-radius:50px; background:#fff; font-weight:bold; color:#555; box-shadow:0 2px 8px rgba(0,0,0,.08); cursor:pointer; }
        .ctrl button.on { background:#2c3e50; color:#fff; }
        
        .card { background:#fff; padding:18px; border-radius:16px; margin-bottom:12px; position:relative; border:1px solid #f0f0f0; }
        .card.r { opacity:.6; background:#f8f9fa; }
        .card.p { background:#fffcf2; }
        .card.b { opacity:.7; background:#fff5f5; }
        .c-top { display:flex; justify-content:space-between; margin-bottom:12px; align-items:center; }
        .c-top strong { color:#e74c3c; font-size:1.3rem; font-weight:800; }
        .c-top span { background:#eee; padding:3px 8px; border-radius:6px; font-size:.8rem; margin-left:8px; font-weight:bold; color:#555; }
        .note { color:#888; font-size:.9rem; max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right;}
        .code { background:#ebf5ff; color:#007bff; border:2px dashed #a6cfff; padding:14px; text-align:center; border-radius:10px; font-family:monospace; font-size:1.4rem; font-weight:bold; margin-bottom:12px; cursor:pointer; user-select:all; }
        .acts { display:flex; justify-content:space-between; border-top:1px solid #eee; padding-top:12px; align-items:center; }
        .acts a { color:#999; font-size:.85rem; padding:6px 10px; background:#f9f9f9; border-radius:8px; cursor:pointer; }
        label { display:flex; align-items:center; gap:8px; font-weight:bold; color:#555; cursor:pointer; }
        input[type="checkbox"] { width:22px; height:22px; accent-color:#27ae60; cursor:pointer; }
        
        .btn { width:100%; padding:14px; border:none; border-radius:12px; font-weight:bold; font-size:1.05rem; cursor:pointer; margin-bottom:15px; }
        
        /* 雙下載按鈕排版與樣式 */
        .copy-btns { display:flex; gap:10px; margin-bottom:20px; }
        .copy-btns .btn { margin-bottom:0; flex:1; font-size:0.9rem; padding:12px 0; }
        .btn-new { background:linear-gradient(135deg, #16a085, #1abc9c); color:#fff; box-shadow:0 4px 15px rgba(26,188,156,.3); }
        .btn-old { background:linear-gradient(135deg, #2c3e50, #34495e); color:#fff; box-shadow:0 4px 15px rgba(44,62,80,.3); }
        .btn-new:active, .btn-old:active { transform:scale(0.96); }

        #toast { position:fixed; bottom:-50px; left:50%; transform:translateX(-50%); background:rgba(30,30,30,.9); color:#fff; padding:12px 24px; border-radius:50px; transition:.3s; z-index:99; font-weight:bold; white-space:nowrap; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(2px); }
        .m-box { background:#fff; padding:25px; border-radius:20px; width:85%; max-width:320px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.25); }

        /* === 漂浮安裝通知條 === */
        .install-bar { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:92%; max-width:450px; background:#2c3e50; color:#fff; padding:14px 18px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.3); z-index:9999; align-items:center; gap:12px; animation: slideUp 0.5s ease; }
        .i-logo { width:45px; height:45px; border-radius:10px; object-fit:cover; }
        .i-text { flex:1; display:flex; flex-direction:column; }
        .i-text strong { font-size:1.05rem; }
        .i-text span { font-size:0.8rem; color:#bdc3c7; margin-top:2px; }
        .i-btn { background:#27ae60; color:#fff; border:none; padding:8px 16px; border-radius:50px; font-weight:bold; cursor:pointer; font-size:0.95rem; }
        .i-btn:active { transform:scale(0.95); }
        .i-close { padding:5px; color:#7f8c8d; cursor:pointer; font-size:1.2rem; margin-left:5px; font-weight:bold; }
        @keyframes slideUp { from { bottom:-100px; opacity:0; } to { bottom:20px; opacity:1; } }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>贏麻小助手</h2>
        
        <div class="dash">
            <div><span>禮包總數</span><strong id="v-cnt">0</strong></div>
            <div><span>總福利</span><strong id="v-pts" style="color:#e74c3c">0</strong></div>
        </div>

        <div class="ctrl">
            <button id="b-date" class="on" onclick="app.sort('d')">📅 日期</button>
            <button id="b-pts" onclick="app.sort('p')">💰 點數</button>
            <button id="b-fil" onclick="app.filt()">📋 未領</button>
        </div>

        <div class="copy-btns">
            <button class="btn btn-new" onclick="app.downloadGroupImage('new')">🖼️ 下載新群圖檔</button>
            <button class="btn btn-old" onclick="app.downloadGroupImage('old')">🖼️ 下載舊群圖檔</button>
        </div>

        <div id="loading" style="text-align:center;color:#e67e22;font-weight:bold;padding:20px;">🔄 連線讀取中...</div>
        
        <div style="font-weight:bold;color:#555;margin:15px 0 10px;padding-left:10px;border-left:4px solid #e74c3c;">🔥 最新禮包區</div>
        <div id="list"></div>

        <button class="btn" style="background:#e0e0e0;color:#555;box-shadow:none;margin-top:15px;" onclick="document.getElementById('old').style.display='block';this.style.display='none';">📂 顯示歷史庫存 ▼</button>
        <div id="old" style="display:none"></div>

        <div style="text-align:center; margin-top:40px;"><span style="font-size:0.9rem; color:#ccc; cursor:pointer; text-decoration:underline;" onclick="app.reset()">重置紀錄</span></div>
    </div>

    <div id="toast"></div>

    <div id="mod" class="modal">
        <div class="m-box">
            <h3 style="margin-top:0;margin-bottom:20px;color:#333;">回報失效</h3>
            <button class="btn" style="background:#fff5f5;color:#e74c3c;border:1px solid #ffcccc;box-shadow:none;" onclick="app.rep('過期')">📅 已過期</button>
            <button class="btn" style="background:#fff5f5;color:#e74c3c;border:1px solid #ffcccc;box-shadow:none;" onclick="app.rep('領完')">😫 已領完</button>
            <button class="btn" style="background:#fff;color:#555;border:1px solid #eee;box-shadow:none;margin-bottom:0;" onclick="document.getElementById('mod').style.display='none'">取消</button>
        </div>
    </div>

    <div id="install-bar" class="install-bar">
        <img src="https://raw.githubusercontent.com/ox0114xo/Gift-code/b9cefb2c764b9b84b111abfddf9df6ec9327a6f5/1771553807683.png" class="i-logo">
        <div class="i-text">
            <strong>加到手機桌面</strong>
            <span id="i-desc">一鍵開啟，免找網址！</span>
        </div>
        <button id="i-btn" class="i-btn">安裝</button>
        <span class="i-close" onclick="document.getElementById('install-bar').style.display='none'">✕</span>
    </div>

    <script>
    // === 設定區 ===
    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSkENoeJW2fV8JucN514cMysAStsgNLzjbYKrE04bDSAJOKTayexd-Ve3Fce4KB6FQsXvtMTgPZ7Mnw/pub?output=csv";
    const CUT = 213; // 新舊禮包分界線

    // === 動態寫入 PWA 條件 ===
    const icon = "https://raw.githubusercontent.com/ox0114xo/Gift-code/b9cefb2c764b9b84b111abfddf9df6ec9327a6f5/1771553807683.png";
    document.getElementById('pwa-manifest').href = 'data:application/manifest+json;utf-8,'+encodeURIComponent(JSON.stringify({name:"贏麻小助手",short_name:"贏麻小助手",start_url:".",display:"standalone",background_color:"#f2f4f7",icons:[{src:icon,sizes:"192x192",type:"image/png"}]}));
    if('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob(["self.addEventListener('fetch',e=>{});"], {type:'text/javascript'})));

    // === 安裝通知邏輯 ===
    let defPrompt;
    const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const iBar = document.getElementById('install-bar');
    const iBtn = document.getElementById('i-btn');
    const iDesc = document.getElementById('i-desc');

    if (!isApp) {
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            defPrompt = e;
            iBar.style.display = 'flex'; 
            iBtn.onclick = () => {
                defPrompt.prompt();
                defPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') iBar.style.display = 'none';
                    defPrompt = null;
                });
            };
        });

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
            setTimeout(() => {
                iBar.style.display = 'flex';
                iDesc.innerHTML = "點擊底部的 <b>分享⍗</b> 加到主畫面";
                iBtn.style.display = 'none';
            }, 800);
        }
    }

    // === 核心程式 ===
    const app = {
        d: [], st: JSON.parse(localStorage.getItem('gData')) || { r:[], p:[], b:{}, s:'d', asc:false, f:false }, tId: null,
        init() {
            fetch(SHEET).then(r=>r.text()).then(c=>{
                document.getElementById('loading').style.display='none';
                let l = c.split(/\r?\n/);
                for(let i=1; i<l.length; i++){
                    let row = l[i].split(',');
                    if(row[2]) this.d.push({ d:row[0].trim(), p:+row[1], c:row[2].trim(), n:row[3]||"" });
                }
                this.rnd();
            }).catch(()=>document.getElementById('loading').innerText='⚠️ 資料讀取失敗');
        },
        sv() { localStorage.setItem('gData', JSON.stringify(this.st)); this.rnd(); },
        pd(d) { let a=d.split('/'); return a[0]*100 + +a[1]; },
        rnd() {
            let pts=0, a=this.d.filter(x=>{ pts+=x.p; return !this.st.f || (!this.st.r.includes(x.c) && !this.st.b[x.c]); });
            document.getElementById('v-cnt').innerText = this.d.length;
            document.getElementById('v-pts').innerText = pts;
            a.sort((x,y) => this.st.s==='d' ? (this.st.asc ? this.pd(x.d)-this.pd(y.d) : this.pd(y.d)-this.pd(x.d)) : (this.st.asc ? x.p-y.p : y.p-x.p));
            
            let hN='', hO='';
            a.forEach(x => {
                let isR=this.st.r.includes(x.c), isP=this.st.p.includes(x.c), isB=!!this.st.b[x.c];
                let cls = isB?'b':isR?'r':isP?'p':'';
                let tag = isB?'<div class="tag b" style="position:absolute;top:0;right:0;padding:4px 10px;font-size:0.75rem;border-radius:0 16px 0 12px;background:#ffcccc;color:#c0392b;font-weight:bold;">⚠️ 失效</div>' : 
                          isP?'<div class="tag p" style="position:absolute;top:0;right:0;padding:4px 10px;font-size:0.75rem;border-radius:0 16px 0 12px;background:#ffeeba;color:#b7791f;font-weight:bold;">⏳ 暫存</div>' : '';
                
                let h = `<div class="card ${cls}">${tag}<div class="c-top"><div><strong>💰${x.p}</strong><span>${x.d}</span></div><div class="note">${x.n}</div></div><div class="code" onclick="app.cp('${x.c}')">${x.c}</div><div class="acts"><div style="display:flex;gap:8px"><a onclick="app.op('${x.c}')">⚠️回報</a><a onclick="app.tp('${x.c}')" style="color:${isP?'#d35400':'#999'}">⏳資格未符</a></div><label><input type="checkbox" onchange="app.tr('${x.c}',this.checked)" ${isR?'checked':''}>已領</label></div></div>`;
                this.pd(x.d)>=CUT ? hN+=h : hO+=h;
            });
            document.getElementById('list').innerHTML = hN||'<div style="text-align:center;padding:20px;color:#999">無資料</div>';
            document.getElementById('old').innerHTML = hO||'<div style="text-align:center;padding:20px;color:#999">無資料</div>';
            
            document.getElementById('b-date').className=this.st.s==='d'?'on':'';
            document.getElementById('b-pts').className=this.st.s==='p'?'on':'';
            document.getElementById('b-fil').className=this.st.f?'on':'';
        },
        sort(k) { this.st.asc = (this.st.s===k) ? !this.st.asc : false; this.st.s=k; this.sv(); },
        filt() { this.st.f = !this.st.f; this.sv(); },
        tr(c, v) { v ? (this.st.r.push(c), this.st.p=this.st.p.filter(x=>x!==c)) : this.st.r=this.st.r.filter(x=>x!==c); this.sv(); },
        tp(c) { this.st.p.includes(c) ? this.st.p=this.st.p.filter(x=>x!==c) : this.st.p.push(c); this.sv(); },
        cp(c) { 
            if(this.st.b[c]) return this.msg('⚠️ 該序號已回報失效'); 
            let e=document.createElement('textarea'); e.value=c; document.body.appendChild(e); e.select(); document.execCommand('copy'); e.remove();
            this.msg('✅ 已複製並標記領取'); this.tr(c,true); 
        },
        // === 產出並下載序號圖片 ===
        downloadGroupImage(type) {
            if (typeof html2canvas === 'undefined') {
                return this.msg('⚠️ 圖片生成核心載入失敗，請重新整理。');
            }
            if(this.d.length === 0) return this.msg('⚠️ 尚未載入資料');

            // 1. 篩選與排序資料
            let arr = this.d.filter(x => type==='new' ? this.pd(x.d)>=CUT : this.pd(x.d)<CUT).sort((x,y) => this.pd(y.d) - this.pd(x.d));
            
            if(arr.length === 0) return this.msg(`⚠️ 沒有${type==='new'?'新群':'舊群'}資料`);

            this.msg('🔄 正在生成圖檔，請稍候...');

            // 2. 建立隱藏的 DOM 元素來繪製圖片內容
            let imgDom = document.createElement('div');
            imgDom.style.cssText = "position:absolute; left:-10000px; top:0; width:450px; background:#fff; padding:30px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color:#333; box-sizing:border-box;";
            
            // 加入指定的網址到最上方
            imgDom.innerHTML = `<div style="text-align:center; font-weight:900; font-size:1.1rem; color:#d35400; padding-bottom:15px; border-bottom:1px solid #eee;">👉 網頁一鍵複製連結：<br>https://ppt.cc/f9c9mx</div>`;
            
            imgDom.innerHTML += `<h2 style="text-align:center; font-size:1.6rem; color:#2c3e50; margin: 20px 0;">🧧 ${type==='new'?'新群':'舊群'}禮包清單</h2>`;

            // 產生清單內容文字
            let listTxt = '';
            arr.forEach(x => {
                listTxt += `<div style="border:1px solid #eee; background:#fff; padding:15px; border-radius:12px; margin-bottom:12px;"><div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;"><span style="color:#d35400;">💰${x.p}點</span><span style="color:#7f8c8d;">${x.d} ${x.n}</span></div><div style="font-family:monospace; font-size:1.4rem; color:#007bff; text-align:center; padding:10px; background:#ebf5ff; border:2px dashed #a6cfff; border-radius:10px; font-weight:bold;">${x.c}</div></div>`;
            });
            imgDom.innerHTML += `<div style="margin-top:20px;">${listTxt}</div>`;
            imgDom.innerHTML += `<div style="text-align:center; color:#bdc3c7; font-size:0.8rem; margin-top:25px;">由 [贏麻小助手] 自動產出</div>`;

            document.body.appendChild(imgDom);

            // 3. 使用 html2canvas 轉成畫布
            html2canvas(imgDom, {
                scale: 2, // 提高解析度（高清）
                useCORS: true, // 允許跨域圖片（雖然此處無圖片）
                backgroundColor: "#f2f4f7" // 圖片背景色
            }).then(canvas => {
                // 4. 轉成 PNG 並下載
                let imgData = canvas.toDataURL('image/png');
                let link = document.createElement('a');
                link.href = imgData;
                link.download = ` win_gift_${type}_${new Date().toISOString().slice(0,10)}.png`;
                link.click();

                // 5. 移除隱藏的 DOM
                document.body.removeChild(imgDom);
                app.msg('🖼️ 圖檔已產生並開始下載！');
            });
        },
        msg(m) { let t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); t.style.bottom='40px'; setTimeout(()=>{t.style.bottom='-50px'; t.classList.remove('show');},2500); },
        op(c) { this.tId=c; document.getElementById('mod').style.display='flex'; },
        rep(t) { this.st.b[this.tId]=t; this.sv(); document.getElementById('mod').style.display='none'; this.msg(`✅ 已標記為${t}`); },
        reset() { if(confirm('確定清空所有領取與暫存紀錄嗎？')){ localStorage.removeItem('gData'); location.reload(); } }
    };
    app.init();
    </script>
</body>
</html>
